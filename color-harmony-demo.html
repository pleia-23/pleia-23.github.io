<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>图觅 · 大师配色选拔</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e10;color:#eee;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;padding:20px 14px 80px}
.head{max-width:1080px;margin:0 auto 14px}
.head h1{font-size:18px;font-weight:600}
.head p{font-size:12px;color:#9a9a9a;margin-top:6px;line-height:1.7}
#status{position:sticky;top:0;background:rgba(14,14,16,.92);padding:10px 0;font-size:13px;color:#7fd1a6;z-index:5}
.grid{max-width:1080px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.card{position:relative;aspect-ratio:3/4;border-radius:12px;overflow:hidden;background:#1a1a1c}
.card img{width:100%;height:100%;object-fit:cover;display:block}
.badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);padding:4px 8px;border-radius:8px;font-size:11px;line-height:1.35}
.badge .sc{color:#ffd76a;font-weight:600}
.badge .tp{color:#fff}
.by{position:absolute;left:8px;bottom:8px;font-size:10px;color:#fff;text-shadow:0 1px 3px #000;max-width:70%;line-height:1.4}
</style>
</head>
<body>
<div class="head">
  <h1>图觅 PICSEEK · 大师配色选拔</h1>
  <p>素材：偏建筑 / 风景 / 静物 / 强配色的作品级图（精选 44 张）。主色在<b>浏览器前端用 canvas 直接计算</b>——图片 CDN（Unsplash）已开启跨域，canvas 读取不污染，圆点颜色 100% 准确，不依赖后端。</p>
</div>
<div id="status">准备中…</div>
<div id="grid" class="grid"></div>
<script src="common.js"></script>
<script>
const API="https://tumi-d9guyt1ju744e0622.service.tcloudbase.com/api";
const TOPICS=[
  'minimalist architecture',
  'landscape photography golden hour',
  'fine art color study',
  'color blocking still life',
  'Wes Anderson color palette',
  'abstract color gradient'
];
function rgb2hsl(r,g,b){
  r/=255;g/=255;b/=255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  let h=0,s=0,l=(mx+mn)/2;
  if(mx!==mn){const d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);
    if(mx===r)h=(g-b)/d+(g<b?6:0);
    else if(mx===g)h=(b-r)/d+2;
    else h=(r-g)/d+4;
    h*=60;}
  return {h,s,l};
}
function rgb2hex(r,g,b){
  const f=v=>{v=Math.max(0,Math.min(255,Math.round(v||0)));return v.toString(16).padStart(2,'0');};
  return '#'+f(r)+f(g)+f(b);
}
function hex2rgb(hex){hex=hex.replace('#','');return [parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];}
function hueDist(a,b){let d=Math.abs(a-b)%360;return d>180?360-d:d;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
/* ---------- 配色打分 v3：双色系统 ---------- */
function scoreTwoColors(a,b){
  const h1=((a.h||0)%360+360)%360, h2=((b.h||0)%360+360)%360;
  const s1=a.s==null?0:a.s, s2=b.s==null?0:b.s;
  const l1=a.l==null?0.5:a.l, l2=b.l==null?0.5:b.l;
  const d=hueDist(h1,h2);
  const avgS=(s1+s2)/2, minS=Math.min(s1,s2);
  const lc=Math.abs(l1-l2);
  const warm = (h1<55||h1>=330)||(h2<55||h2>=330);
  const cool = (h1>=200&&h1<285)||(h2>=200&&h2<285);
  const bothWarm = (h1<55||h1>=330)&&(h2<55||h2>=330);
  const bothCool = (h1>=200&&h1<285)&&(h2>=200&&h2<285);
  const tempCoherent = bothWarm||bothCool||(!warm&&!cool);
  const sameSat = Math.abs(s1-s2)<0.35;

  if(minS<0.12 && avgS>0.20){
    const accent=s1>s2?a:b;
    const neutral=s1>s2?b:a;
    let nScore=0;
    if(accent.s>0.35){ nScore=72; }
    else if(accent.s>0.20){ nScore=55; }
    if(lc>0.30) nScore+=10;
    if(lc>0.55) nScore+=5;
    if(neutral.l>0.85) nScore+=4;
    if(neutral.l<0.25) nScore+=4;
    if(accent.s>0.70) nScore-=6;
    return { score: Math.max(0, Math.min(100, Math.round(nScore))), type: '中性强调', pair: [a.hex, b.hex] };
  }

  let hScore=0, hType='邻近和谐';
  if(d>=12&&d<=55){ hScore=95-Math.abs(d-28)*1.35; }
  else if(d<12){ hScore=55-d*3; }
  if(hScore>0){ if(sameSat) hScore+=5; if(tempCoherent) hScore+=4; if(lc>=0.12&&lc<=0.55) hScore+=4; }

  let cScore=0, cType='互补撞色';
  if(d>=140&&d<=180){ cScore=92-Math.abs(d-180)*0.45; cType='互补撞色'; }
  else if(d>=100&&d<140){ cScore=74-Math.abs(d-120)*0.75; cType='强对比'; }
  if(cScore>0){
    if(minS<0.25) cScore-=16; else if(minS<0.40) cScore-=6;
    if(avgS>0.75) cScore+=4; if(lc>=0.25) cScore+=6; if(warm&&cool) cScore+=5;
  }

  let nScore=0, nType='独特创意';
  if(d>=50&&d<=100){
    nScore=72-Math.abs(d-75)*0.65;
    if(minS>0.55) nScore+=10; if(lc>=0.20) nScore+=5;
    if(!bothWarm&&!bothCool&&(warm||cool)) nScore+=3;
  }

  let score=Math.max(hScore,cScore,nScore);
  let type=hScore>=score?hType:(cScore>=score?cType:nType);
  if(score===0) type='普通';
  if(avgS<0.15) score-=18;
  if(minS>0.90&&lc<0.12) score-=10;
  if(avgS>0.85&&lc<0.08) score-=8;
  if(tempCoherent&&score>0) score+=3;
  if(lc>0.45) score+=3;

  return { score: Math.max(0, Math.min(100, Math.round(score))), type, pair: [a.hex, b.hex] };
}
function bestColorPair(colors){
  if(!colors||colors.length<2) return {score:0, type:'单色', pair:[]};
  if(colors.length===2) return scoreTwoColors(colors[0], colors[1]);
  let best={score:0, type:'单色', pair:[]};
  for(let i=0;i<colors.length;i++) for(let j=i+1;j<colors.length;j++){ const r=scoreTwoColors(colors[i],colors[j]); if(r.score>best.score) best=r; }
  return best;
}
function harmonyScore(colors){
  if(!colors||colors.length<2) return {score:0, type:'单色', pair:[]};
  const best=bestColorPair(colors);
  let pen=skinPenalty(colors);
  pen += uncomfortablePenalty(colors);
  best.score=Math.max(0, Math.round(best.score-pen));
  return best;
}
function skinPenalty(colors){
  if(!colors||!colors.length) return 0;
  const m=colors[0];
  const skin=m.h>10&&m.h<45&&m.s>0.22&&m.s<0.66&&m.l>0.35&&m.l<0.78;
  const total=colors.reduce((a,c)=>a+(c.c||1),0)||1;
  const share=(m.c||1)/total;
  return (skin&&share>0.45)?18:0;
}
function aiGradientPenalty(colors){
  if(!colors||colors.length<3) return 0;
  const ai = colors.filter(c=> c.s>0.45 && ((c.h>=250&&c.h<=320)||(c.h>=190&&c.h<=230)) );
  return ai.length>=3 ? 14 : 0;
}
function uncomfortablePenalty(colors){
  if(!colors||colors.length<2) return 0;
  let maxPen=0;
  for(let i=0;i<colors.length;i++) for(let j=i+1;j<colors.length;j++){
    const a=colors[i], b=colors[j];
    const d=hueDist(a.h,b.h); const s=(a.s+b.s)/2; const lc=Math.abs(a.l-b.l);
    if(d>=45&&d<100 && s>0.70 && lc<0.30){
      const pen=Math.min(22, 10 + (s-0.70)*20 + (100-d)*0.08);
      if(pen>maxPen) maxPen=pen;
    }
  }
  return maxPen;
}
function findMostUncomfortablePair(colors){
  if(!colors||colors.length<2) return null;
  let worst=null, worstScore=-Infinity;
  for(let i=0;i<colors.length;i++) for(let j=i+1;j<colors.length;j++){
    const a=colors[i], b=colors[j];
    const d=hueDist(a.h,b.h); const s=(a.s+b.s)/2; const lc=Math.abs(a.l-b.l);
    let ug=0;
    if(d>=45&&d<100){ ug += (100-d)*0.7; ug += Math.max(0,s-0.5)*40; ug += Math.max(0,0.30-lc)*30; if(s>0.6&&lc<0.30) ug+=15; }
    if(ug>worstScore){ worstScore=ug; worst={a,b,ug}; }
  }
  if(!worst||worstScore<15) return null;
  return worst;
}
function discomfortScore(colors){
  const p=findMostUncomfortablePair(colors);
  return p?Math.min(100,Math.round(p.ug)):0;
}
// 把 [{hex,rgb:[r,g,b]}] 转成内部 {r,g,b,h,s,l,hex,c} 供打分用
function toColors(arr){
  return (arr||[]).map(c=>{
    const rgb=c.rgb||[0,0,0];
    const hsl=rgb2hsl(rgb[0],rgb[1],rgb[2]);
    return {r:rgb[0],g:rgb[1],b:rgb[2],h:hsl.h,s:hsl.s,l:hsl.l,hex:c.hex,c:1};
  });
}
// 前端 canvas 提取主色：图片 CDN 已开跨域，crossOrigin='anonymous' 不会污染 canvas
function loadImage(url){
  return new Promise((resolve)=>{
    const img=new Image();
    img.crossOrigin='anonymous';      // 必须在 src 之前设置
    img.onload=()=>resolve(img);
    img.onerror=()=>resolve(null);
    img.src=url;
  });
}
function extractDominant(img,n=3){
  try{
    const S=32;
    const cv=document.createElement('canvas');
    cv.width=S; cv.height=S;
    const ctx=cv.getContext('2d',{willReadFrequently:true});
    ctx.drawImage(img,0,0,S,S);
    const data=ctx.getImageData(0,0,S,S).data;   // 不抛异常即未污染
    const map=new Map();
    for(let i=0;i<data.length;i+=4){
      if(data[i+3]<125) continue;               // 跳过透明像素
      const r=data[i],g=data[i+1],b=data[i+2];
      const key=(r<<16)|(g<<8)|b;
      map.set(key,(map.get(key)||0)+1);
    }
    const arr=[...map.entries()].map(([k,c])=>({r:(k>>16)&255,g:(k>>8)&255,b:k&255,n:c}));
    arr.sort((a,b)=>b.n-a.n);
    const out=[];
    for(const c of arr){
      if(out.length>=n) break;
      if(out.some(o=>Math.max(Math.abs(o.r-c.r),Math.abs(o.g-c.g),Math.abs(o.b-c.b))<48)) continue;
      out.push(c);
    }
    return out.map(c=>({hex:rgb2hex(c.r,c.g,c.b),rgb:[c.r,c.g,c.b]}));
  }catch(e){
    return [];   // 极少数未开跨域的图会走到这里，直接跳过
  }
}
const grid=document.getElementById('grid');
const status=document.getElementById('status');
async function fetchPhotos(){
  // 读取精选图集：同源优先 photos.json，外部站点走跨域代理
  try{
    const j=await loadPhotosData();
    return (j.results||[]).slice(0,48);
  }catch(e){
    return [];
  }
}
async function run(){
  const photos=await fetchPhotos();
  if(!photos.length){ status.textContent='未拉到图片，请检查网络 / 代理。'; return; }
  let scanned=0,passed=0;
  for(const p of photos){
    const img=await loadImage(p.thumb||p.full);
    if(!img) continue;
    const raw=extractDominant(img,3);
    if(!raw||raw.length<2) continue;
    const colors=toColors(raw);
    scanned++;
    const {score,type}=harmonyScore(colors);
    const pen=skinPenalty(colors)+aiGradientPenalty(colors);
    const finalScore=Math.max(0,score-pen);
    status.textContent='已扫描 '+scanned+' 张，选拔出 '+passed+' 张…';
    if(finalScore>=72){
      passed++;
      const swHtml=raw.map(c=>'<i style="display:inline-block;width:28px;height:28px;border-radius:50%;background-color:'+c.hex+';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.7)"></i>').join('');
      const hexText=raw.map(c=>c.hex).join('  ');
      const card=document.createElement('div');
      card.className='card';
      card.innerHTML='<img src="'+p.thumb+'">'+
        '<div class="badge"><div class="sc">'+finalScore+'分</div><div class="tp">'+type+'</div></div>'+
        '<div style="position:absolute;right:8px;bottom:8px;display:flex;gap:6px">'+swHtml+'</div>'+
        '<div class="by">'+hexText+'<br>'+(p.photographer||'')+'</div>';
      grid.appendChild(card);
    }
  }
  status.textContent='完成：扫描 '+scanned+' 张，选拔出 '+passed+' 张优秀（≥72分）';
}
run();
</script>
</body>
</html>
